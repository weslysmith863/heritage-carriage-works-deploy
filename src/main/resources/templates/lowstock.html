<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <title>Low Stock Report - Heritage Carriage Works</title>
</head>
<body>
<div class="container mt-4">
    <h1>Heritage Carriage Works</h1>
    <h2>Low Stock Report</h2>
    <p class="text-muted">Generated: <span th:text="${timestamp}"></span></p>
    <hr>

    <div th:if="${lowStockParts.isEmpty()}">
        <div class="alert alert-success">All parts are adequately stocked.</div>
    </div>

    <div th:if="${!lowStockParts.isEmpty()}">
        <div class="alert alert-warning">
            The following parts are at or below minimum inventory levels and require restocking.
        </div>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>Part Name</th>
                <th>Current Inventory</th>
                <th>Minimum Inventory</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="part : ${lowStockParts}">
                <td th:text="${part.name}"></td>
                <td th:text="${part.inv}"></td>
                <td th:text="${part.minInv}"></td>
                <td>
                    <span th:if="${part.inv == 0}" class="badge bg-danger">Out of Stock</span>
                    <span th:if="${part.inv > 0 and part.inv <= part.minInv}" class="badge bg-warning text-dark">Low Stock</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/mainscreen}" class="btn btn-secondary">Back to Main Screen</a>
</div>
</body>
</html>
